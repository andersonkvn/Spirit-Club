<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Spirit Club — Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0C10;--surface:#12151C;--card:#181D28;
  --border:#222836;--accent:#00E5A0;--blue:#3B82F6;
  --warn:#F59E0B;--red:#EF4444;--purple:#A78BFA;
  --text:#EEF2FF;--muted:#5A6A8A;--subtle:#1E2436;
}
html,body{height:100%}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);
  display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;
  background-image:radial-gradient(ellipse at 20% 50%,rgba(0,229,160,0.04) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 20%,rgba(59,130,246,0.04) 0%,transparent 50%)}
.wrap{width:100%;max-width:400px;text-align:center}
.pins{display:flex;justify-content:center;gap:5px;margin-bottom:24px}
.pin{width:10px;height:15px;border-radius:3px 3px 6px 6px;opacity:0;
  animation:fadepin 0.4s ease forwards}
.pin:nth-child(1){background:#00E5A0;animation-delay:.05s}
.pin:nth-child(2){background:#00E5A0;animation-delay:.1s}
.pin:nth-child(3){background:#00E5A0;animation-delay:.15s}
.pin:nth-child(4){background:#3B82F6;animation-delay:.2s}
.pin:nth-child(5){background:#3B82F6;animation-delay:.25s}
.pin:nth-child(6){background:#3B82F6;animation-delay:.3s}
.pin:nth-child(7){background:#A78BFA;animation-delay:.35s}
.pin:nth-child(8){background:#A78BFA;animation-delay:.4s}
.pin:nth-child(9){background:#A78BFA;animation-delay:.45s}
.pin:nth-child(10){background:#F59E0B;animation-delay:.5s}
@keyframes fadepin{to{opacity:1}}
h1{font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:700;
  letter-spacing:-0.5px;margin-bottom:6px}
h1 span{color:var(--accent)}
.tagline{font-size:13px;color:var(--muted);margin-bottom:36px;line-height:1.6}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px 24px;margin-bottom:14px}
.card-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;font-weight:600;margin-bottom:14px}
.btn-google{display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:13px 20px;background:var(--accent);color:#000;
  border:none;border-radius:10px;font-family:'Inter',sans-serif;
  font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s}
.btn-google:hover{opacity:.88}
.btn-google:active{transform:scale(.98)}
.btn-google svg{width:18px;height:18px;flex-shrink:0}
.err-msg{font-size:12px;color:var(--red);margin-top:10px;min-height:16px}
.note{font-size:11px;color:var(--muted);line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <div class="pins">
    <div class="pin"></div><div class="pin"></div><div class="pin"></div>
    <div class="pin"></div><div class="pin"></div><div class="pin"></div>
    <div class="pin"></div><div class="pin"></div><div class="pin"></div><div class="pin"></div>
  </div>
  <h1>Spirit <span>Club</span></h1>
  <p class="tagline">Dashboard bowling resmi Spirit Club.<br>Login untuk melihat statistik dan leaderboard kamu.</p>
  <div class="card">
    <div class="card-label">Login member</div>
    <button class="btn-google" onclick="loginGoogle()">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Lanjutkan dengan Google
    </button>
    <div class="err-msg" id="errMsg"></div>
  </div>
  <p class="note">Hanya email yang terdaftar sebagai member yang bisa mengakses.<br>Hubungi admin jika belum terdaftar.</p>
</div>
<script>
const SUPABASE_URL='GANTI_SUPABASE_URL';
const SUPABASE_ANON_KEY='GANTI_SUPABASE_ANON_KEY';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
async function loginGoogle(){
  document.getElementById('errMsg').textContent='';
  const{error}=await sb.auth.signInWithOAuth({provider:'google',
    options:{redirectTo:window.location.origin+'/dashboard.html'}});
  if(error)document.getElementById('errMsg').textContent='Login gagal: '+error.message;
}
sb.auth.getSession().then(({data:{session}})=>{if(session)window.location.href='dashboard.html'});
</script>
</body>
</html>
